          ["真实UI范围", ["手机线框内只展示用户真实可见内容。", "规则说明均在黄色标签中。"]],
          ["入口规则", ["6组入口按后台全局配置和单用户配置共同决定。", "普通会员、尊享会员两张卡分别可控。"]],
          ["跳转规则", ["入口点击目标来自后台配置：固定页面、表单、外链。"]]
        ]);
      },
      "teacher-profile"() {
        pageShell("移动端：优坐标教师端个人中心", "教师端使用同一套文案、图片和跳转配置，展示结果按教师端开关和单用户规则决定。", phoneProfile("教师"), [
          ["端差异", ["教师端与家长端共用配置内容。", "教师端可根据开关隐藏尊享会员等入口。"]],
          ["展示规则", ["最终展示结果 = 单用户控制优先，否则读取全局配置。"]]
        ]);
      },
      "hidden-state"() {
        pageShell("移动端：入口关闭后的隐藏态", "展示入口关闭后个人中心不再出现相关模块。", phoneProfile("家长", "hidden"), [
          ["隐藏规则", ["创客中心关闭后隐藏团队卡、提现条和相关二级入口。", "普通会员卡、尊享会员卡可分别隐藏。", "四个圆形入口关闭后不占位展示。"]],
          ["状态说明", ["隐藏态属于同一页面状态，不进入左侧导航子节点；本页用于评审可视化。"]]
        ]);
      },
      "closed-link"() {
        pageShell("移动端：历史链接不可访问", "入口关闭后，通过历史链接或详情页直接访问时展示不可访问状态。", `<div class="phone-wrap"><div class="phone"><div class="phone-status"><span>23:58</span><span>●●● ▰</span></div><div class="phone-title">访问受限 <span class="mini-menu">••• ◎</span></div><div class="closed-page"><div class="closed-card"><div class="closed-icon">!</div><h2>入口已关闭</h2><p class="muted">该入口当前不可访问，请返回个人中心查看可用服务。</p><button class="btn primary">返回个人中心</button></div></div></div></div>`, [
          ["异常规则", ["入口关闭后，历史链接或详情页直接访问禁止打开。", "页面展示不可访问或已关闭状态。"]],
          ["按钮结果", ["点击“返回个人中心”回到当前端个人中心。"]]
        ]);
      }
    };

    function go(page) {
      document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.page === page));
      pages[page]();
      location.hash = page;
    }

    function openModal() {
      document.getElementById("saveModal").classList.add("show");
    }
    function closeModal() {
      document.getElementById("saveModal").classList.remove("show");
    }
    function confirmSave() {
      closeModal();
      const status = document.getElementById("saveStatus");
      if (status) status.classList.add("show");
    }
    function openPermissionModal(kind) {
      currentPermissionKind = kind;
      const user = managerUsers[kind];
      document.getElementById("permissionModalBody").innerHTML = `<div class="permission-summary">
        <div><span class="muted">控制对象</span><br><strong>${user.role}：${user.name}</strong>　<span class="muted">${user.phone}</span></div>
        <div><span class="tag blue">单用户优先于全局配置</span></div>
      </div>
      ${permissionTable()}`;
      document.getElementById("permissionModal").classList.add("show");
    }
    function closePermissionModal() {
      document.getElementById("permissionModal").classList.remove("show");
    }
    function confirmPermission() {
      closePermissionModal();
      const status = document.getElementById(`${currentPermissionKind}PermissionStatus`);
      if (status) status.classList.add("show");
    }

    document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => go(btn.dataset.page)));
    go(location.hash ? location.hash.slice(1) : "intro");
  </script>
</body>
</html>
