<!doctype html>
<html lang="zh-CN" class="prototype-interactive-mode">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>分销模块页面流画布原型 v3</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d7dde8;
      --soft: #eef2f7;
      --accent: #2563eb;
      --ok: #047857;
      --warn: #b45309;
      --danger: #b91c1c;
      --mark: #dc2626;
      --canvas: #202734;
      --canvas-grid: rgba(255,255,255,.08);
      --note: #fff7c2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    .app-shell { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 18px;
      background: rgba(255,255,255,.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 260px; }
    .brand-mark {
      width: 36px; height: 36px; border: 2px solid var(--ink); border-radius: 7px;
      display: grid; place-items: center; font-weight: 800;
    }
    .brand h1 { margin: 0; font-size: 18px; line-height: 1.2; }
    .brand small { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }
    .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .seg {
      display: inline-flex;
      align-items: center;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }
    .seg button {
      border: 0;
      background: transparent;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 7px;
      color: var(--muted);
    }
    .seg button.active { background: var(--ink); color: #fff; }
    .btn {
      border: 1px solid var(--line);
      background: #fff;
      min-height: 36px;
      padding: 7px 12px;
      border-radius: 8px;
      color: var(--ink);
    }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.danger { color: var(--danger); border-color: #fecaca; background: #fff5f5; }
    .btn:disabled { color: #98a2b3; background: #f2f4f7; cursor: not-allowed; }
    .tag {
      display: inline-flex;
      min-height: 24px;
      align-items: center;
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .tag.ok { color: var(--ok); border-color: #bbf7d0; background: #f0fdf4; }
    .tag.warn { color: var(--warn); border-color: #fde68a; background: #fffbeb; }
    .tag.danger { color: var(--danger); border-color: #fecaca; background: #fef2f2; }
    .interactive-shell {
      display: grid;
      grid-template-columns: 230px minmax(0, 1fr);
      min-height: calc(100vh - 64px);
    }
    .side {
      background: #fff;
      border-right: 1px solid var(--line);
      padding: 14px;
    }
    .side-title { color: var(--muted); font-size: 12px; margin: 12px 8px 8px; }
    .side button {
      width: 100%;
      min-height: 40px;
      border: 1px solid transparent;
      background: transparent;
      border-radius: 8px;
      padding: 9px 10px;
      text-align: left;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .side button.active { border-color: #bfdbfe; background: #eff6ff; color: #1d4ed8; font-weight: 700; }
    .workspace { padding: 18px; min-width: 0; }
    .page-grid {
      display: grid;
      grid-template-columns: minmax(360px, 430px) minmax(560px, 1fr);
      gap: 18px;
      align-items: start;
    }
    .page-grid.admin { grid-template-columns: 1fr; }
    .panel {
      position: relative;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 10px;
      padding: 14px;
    }
    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .panel-head h2 { margin: 0 0 4px; font-size: 18px; }
    .panel-head p { margin: 0; color: var(--muted); font-size: 13px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .num { font-size: 28px; font-weight: 800; }
    .cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .cards.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .card {
      position: relative;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 12px;
      min-height: 76px;
    }
    .block {
      position: relative;
      border: 1px dashed #98a2b3;
      background: #fbfcfe;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .block.solid { border-style: solid; background: #fff; }
    .list { display: grid; gap: 8px; }
    .item {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }
    .phone-frame {
      border: 2px solid var(--ink);
      background: #fff;
      border-radius: 24px;
      width: min(100%, 410px);
      margin: 0 auto;
      padding: 12px;
      box-shadow: 0 10px 28px rgba(17,24,39,.08);
    }
    .phone-screen {
      border: 1px solid var(--ink);
      border-radius: 18px;
      overflow: hidden;
      min-height: 720px;
      background: #fff;
    }
    .phone-status {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
    }
    .phone-title {
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
    }
    .phone-body { height: 640px; overflow: auto; padding: 14px; }
    .admin-board {
      border: 1px solid var(--ink);
      min-height: 720px;
      background: #fff;
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
    }
    .admin-nav {
      border-right: 1px solid var(--line);
      padding: 12px;
      background: #fafafa;
    }
    .admin-nav div {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      color: var(--muted);
    }
    .admin-nav div.active { color: #1d4ed8; background: #eff6ff; border-color: #bfdbfe; font-weight: 700; }
    .admin-main { padding: 14px; min-width: 0; }
    .admin-section {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      margin-bottom: 12px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid var(--line); padding: 9px 8px; text-align: left; vertical-align: top; }
    th { background: #f8fafc; color: var(--muted); font-weight: 600; }
    .field { display: grid; gap: 4px; margin-bottom: 10px; }
    .field label { color: var(--muted); font-size: 12px; }
    .field input, .field textarea, .field select {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 9px;
      background: #fff;
    }
    .note-warn {
      border-left: 3px solid var(--warn);
      background: #fffbeb;
      color: #78350f;
      padding: 9px 10px;
      border-radius: 6px;
      font-size: 13px;
      margin: 10px 0;
    }
    .mark {
      position: absolute;
      min-width: 32px;
      height: 28px;
      border-radius: 999px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--mark);
      color: #fff;
      border: 2px solid #fff;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 4px 10px rgba(220,38,38,.26);
      z-index: 5;
    }
    .annotation-panel {
      position: fixed;
      right: 22px;
      top: 86px;
      width: min(420px, calc(100vw - 44px));
      max-height: calc(100vh - 120px);
      overflow: auto;
      display: none;
      z-index: 90;
      background: #fff;
      border: 1px solid var(--ink);
      border-radius: 10px;
      box-shadow: 0 16px 42px rgba(17,24,39,.18);
      padding: 14px;
    }
    .annotation-panel.open { display: block; }
    .annotation-panel h3 { margin: 0 0 8px; }
    .annotation-panel p { color: var(--muted); line-height: 1.55; }

    .canvas-shell { display: none; min-height: calc(100vh - 64px); background: var(--canvas); position: relative; overflow: hidden; }
    body.prototype-canvas-mode .canvas-shell { display: block; }
    body.prototype-canvas-mode .interactive-shell,
    body.prototype-canvas-mode .annotation-panel { display: none !important; }
    body.prototype-interactive-mode .canvas-shell { display: none !important; }
    .canvas-toolbar {
      position: absolute;
      z-index: 30;
      top: 16px;
      left: 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px;
      background: rgba(255,255,255,.95);
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 10px;
      box-shadow: 0 12px 28px rgba(0,0,0,.22);
    }
    .canvas-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background-image:
        linear-gradient(var(--canvas-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--canvas-grid) 1px, transparent 1px);
      background-size: 32px 32px;
      cursor: grab;
    }
    .canvas-viewport.dragging { cursor: grabbing; }
    .canvas-board {
      position: absolute;
      left: 0;
      top: 0;
      width: 1800px;
      height: 2300px;
      transform-origin: 0 0;
    }
    .canvas-node {
      position: absolute;
      width: 390px;
      min-height: 590px;
      background: #f8fafc;
      border: 1px solid rgba(255,255,255,.36);
      border-radius: 14px;
      box-shadow: 0 22px 60px rgba(0,0,0,.32);
      overflow: visible;
      user-select: none;
    }
    .canvas-node-head {
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      border-radius: 14px 14px 0 0;
      cursor: move;
    }
    .canvas-node-body {
      padding: 12px;
      height: 544px;
      overflow: auto;
      background: #f8fafc;
      border-radius: 0 0 14px 14px;
    }
    .canvas-snapshot {
      pointer-events: none;
      transform-origin: top left;
      background: #fff;
    }
    .canvas-link {
      position: absolute;
      height: 3px;
      background: #93c5fd;
      transform-origin: left center;
      border-radius: 99px;
      box-shadow: 0 0 0 1px rgba(147,197,253,.25);
    }
    .canvas-link::after {
      content: "";
      position: absolute;
      right: -1px;
      top: 50%;
      width: 0;
      height: 0;
      border-left: 12px solid #93c5fd;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      transform: translateY(-50%);
    }
    .sticky-note {
      position: absolute;
      width: 210px;
      min-height: 112px;
      padding: 10px;
      background: var(--note);
      border: 1px solid #eab308;
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
      z-index: 8;
      cursor: move;
      user-select: none;
    }
    .sticky-note strong { display: block; font-size: 13px; margin-bottom: 6px; }
    .sticky-note p { margin: 0; color: #5f4b00; font-size: 12px; line-height: 1.45; white-space: pre-wrap; }
    .note-actions { display: flex; gap: 6px; margin-top: 8px; }
    .note-actions button {
      border: 1px solid rgba(0,0,0,.15);
      background: rgba(255,255,255,.62);
      border-radius: 6px;
      padding: 3px 6px;
      font-size: 12px;
    }
    .note-editor {
      position: fixed;
      z-index: 100;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(460px, calc(100vw - 40px));
      display: none;
      background: #fff;
      border: 1px solid var(--ink);
      border-radius: 10px;
      box-shadow: 0 18px 54px rgba(0,0,0,.28);
      padding: 14px;
    }
    .note-editor.open { display: block; }
    .note-editor textarea { min-height: 160px; resize: vertical; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 110;
      display: none;
      background: #101828;
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
    }
    .toast.show { display: block; }
    @media (max-width: 1080px) {
      .interactive-shell { grid-template-columns: 1fr; }
      .side { display: flex; gap: 8px; overflow: auto; border-right: 0; border-bottom: 1px solid var(--line); }
      .side-title { display: none; }
      .side button { min-width: 150px; }
      .page-grid { grid-template-columns: 1fr; }
      .cards.four { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .admin-board { grid-template-columns: 1fr; }
      .admin-nav { display: none; }
    }
  </style>
</head>

  <script>
    const version = "v3_20260621";
    const storagePrefix = "k12-distribution-page-flow-canvas";
    const embeddedPrototypeData = JSON.parse(document.getElementById("prototypeData").textContent);
    const embeddedNotesData = JSON.parse(document.getElementById("canvasNotesData").textContent);

    const state = {
      mode: localStorage.getItem(`${storagePrefix}:mode:${version}`) || "interactive",
      page: localStorage.getItem(`${storagePrefix}:page:${version}`) || "frontend-home",
      marks: localStorage.getItem(`${storagePrefix}:marks:${version}`) !== "hidden",
      role: localStorage.getItem(`${storagePrefix}:role:${version}`) || "finance",
      project: localStorage.getItem(`${storagePrefix}:project:${version}`) || "lingbang",
      canvas: loadJSON(`${storagePrefix}:canvas:${version}`, { scale: 1, x: 40, y: 30 }),
      nodePositions: loadJSON(`${storagePrefix}:nodes:${version}`, {
        "frontend-home": { x: 80, y: 120 },
        "frontend-member": { x: 560, y: 120 },
        "frontend-income": { x: 560, y: 760 },
        "frontend-withdraw": { x: 1040, y: 760 },
        "backend-overview": { x: 80, y: 1460 },
        "backend-withdrawals": { x: 560, y: 1460 },
        "backend-rules": { x: 1040, y: 1460 }
      }),
      notes: loadJSON(`${storagePrefix}:notes:${version}`, embeddedNotesData.notes),
      annotations: loadJSON(`${storagePrefix}:annotations:${version}`, embeddedPrototypeData.annotations),
      drag: null,
      editingNoteId: null
    };

    const pageDefs = [
      { id: "frontend-home", title: "创客中心首页", subtitle: "A：团队和收益入口" },
      { id: "frontend-member", title: "团队成员详情", subtitle: "B：由团队卡片进入" },
      { id: "frontend-income", title: "提现中心", subtitle: "C：由提现入口进入" },
      { id: "frontend-withdraw", title: "提现申请", subtitle: "D：由提现中心进入" },
      { id: "backend-overview", title: "后台总览", subtitle: "E：后台分销入口" },
      { id: "backend-withdrawals", title: "提现审核", subtitle: "F：处理前端提现申请" },
      { id: "backend-rules", title: "佣金规则配置", subtitle: "G：处理规则异常" }
    ];

    function loadJSON(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (error) {
        return fallback;
      }
    }
    function saveJSON(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }
    function toast(text) {
      const el = document.getElementById("toast");
      el.textContent = text;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 1800);
    }
    function marker(id, style) {
      return state.marks ? `<button class="mark" style="${style || ""}" onclick="openAnnotation('${id}')">${id}</button>` : "";
    }
    function setMode(mode) {
      state.mode = mode;
      document.body.classList.toggle("prototype-canvas-mode", mode === "canvas");
      document.body.classList.toggle("prototype-interactive-mode", mode !== "canvas");
      document.documentElement.classList.toggle("prototype-canvas-mode", mode === "canvas");
      document.documentElement.classList.toggle("prototype-interactive-mode", mode !== "canvas");
      document.querySelectorAll("[data-mode]").forEach(btn => btn.classList.toggle("active", btn.dataset.mode === mode));

    function renderStickyNote(note) {
      return `
        <div class="sticky-note" data-note-id="${note.id}" style="left:${note.x}px;top:${note.y}px">
          <strong>${escapeHtml(note.title)}</strong>

          <div class="note-actions">

            <button onclick="deleteNote('${note.id}')">删除</button>
          </div>

      `;
    }
    function buildCanvasLinks() {
      const links = [
        ["frontend-home", "frontend-member"],
        ["frontend-home", "frontend-income"],
        ["frontend-income", "frontend-withdraw"],
        ["frontend-withdraw", "backend-withdrawals"],
        ["backend-overview", "backend-withdrawals"],
        ["backend-overview", "backend-rules"]
      ];
      return links.map(([fromId, toId]) => {
        const from = state.nodePositions[fromId];
        const to = state.nodePositions[toId];
        const x1 = from.x + 390;
        const y1 = from.y + 130;
        const x2 = to.x;
        const y2 = to.y + 130;
        const dx = x2 - x1;
        const dy = y2 - y1;
        const length = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        return `<div class="canvas-link" data-from="${fromId}" data-to="${toId}" title="${fromId} -> ${toId}" style="left:${x1}px;top:${y1}px;width:${length}px;transform:rotate(${angle}deg)"></div>`;
      }).join("");
    }
    function applyCanvasTransform() {
      const board = document.getElementById("canvasBoard");
      board.style.transform = `translate(${state.canvas.x}px, ${state.canvas.y}px) scale(${state.canvas.scale})`;
    }
    function openInteractivePage(pageId) {
      state.page = pageId;
      setMode("interactive");
      setPage(pageId);
    }
    function bindCanvasNodes() {
      document.querySelectorAll(".canvas-node [data-node-drag-handle]").forEach(handle => {
        handle.addEventListener("pointerdown", event => {
          const node = handle.closest(".canvas-node");
          const id = node.dataset.canvasPage;
          const start = state.nodePositions[id];
          state.drag = { type: "node", id, startX: event.clientX, startY: event.clientY, x: start.x, y: start.y };
          handle.setPointerCapture(event.pointerId);
        });
      });
    }
    function bindStickyNotes() {
      document.querySelectorAll(".sticky-note").forEach(noteEl => {
        noteEl.addEventListener("pointerdown", event => {
          if (event.target.tagName === "BUTTON") return;
          const id = noteEl.dataset.noteId;
          const note = state.notes.find(item => item.id === id);
          state.drag = { type: "note", id, startX: event.clientX, startY: event.clientY, x: note.x, y: note.y };
          noteEl.setPointerCapture(event.pointerId);
        });
      });
    }
    function editNote(id) {
      const note = state.notes.find(item => item.id === id);
      state.editingNoteId = id;
      const editor = document.getElementById("noteEditor");
      editor.innerHTML = `
        <div class="row"><strong>编辑便签</strong><button class="btn" onclick="closeNoteEditor()">关闭</button></div>
        <div class="field"><label>标题</label><input id="noteTitle" value="${escapeHtml(note.title)}"></div>
        <div class="field"><label>内容</label><textarea id="noteBody">${escapeHtml(note.body)}</textarea></div>
        <div class="toolbar"><button class="btn primary" onclick="saveNote()">保存</button><button class="btn" onclick="closeNoteEditor()">取消</button></div>
      `;
      editor.classList.add("open");
    }
    function saveNote() {
      const note = state.notes.find(item => item.id === state.editingNoteId);
      note.title = document.getElementById("noteTitle").value.trim() || "未命名便签";
      note.body = document.getElementById("noteBody").value.trim() || "待补充说明。";
      persistNotes();
      closeNoteEditor();
      renderCanvas();
      toast("便签已保存");
    }
    function closeNoteEditor() { document.getElementById("noteEditor").classList.remove("open"); state.editingNoteId = null; }
    function deleteNote(id) {
      if (!confirm("确认删除这个便签？")) return;
      state.notes = state.notes.filter(note => note.id !== id);
      delete state.annotations[id];
      persistNotes();
      saveJSON(`${storagePrefix}:annotations:${version}`, state.annotations);
      renderCanvas();
      toast("便签已删除");
    }
    function addNote() {
      const pageId = pageDefs.some(page => page.id === state.page) ? state.page : "frontend-home";
      const count = state.notes.length + 1;
      const id = `C${String(count).padStart(2, "0")}`;
      const note = { id, pageId, x: 250, y: 470, title: "新增便签", body: "在这里补充页面、字段或规则说明。" };
      state.notes.push(note);
      persistNotes();
      renderCanvas();
      editNote(id);
    }

    document.addEventListener("pointermove", event => {
      if (!state.drag) return;
      const dx = (event.clientX - state.drag.startX) / state.canvas.scale;
      const dy = (event.clientY - state.drag.startY) / state.canvas.scale;
      if (state.drag.type === "node") {
        state.nodePositions[state.drag.id] = { x: state.drag.x + dx, y: state.drag.y + dy };
        saveJSON(`${storagePrefix}:nodes:${version}`, state.nodePositions);
        renderCanvas();
      }
      if (state.drag.type === "note") {
        const note = state.notes.find(item => item.id === state.drag.id);
        note.x = state.drag.x + dx;
        note.y = state.drag.y + dy;
        persistNotes();
        const el = document.querySelector(`[data-note-id="${state.drag.id}"]`);
        if (el) { el.style.left = `${note.x}px`; el.style.top = `${note.y}px`; }
      }
      if (state.drag.type === "pan") {
        state.canvas.x = state.drag.x + event.clientX - state.drag.startX;
        state.canvas.y = state.drag.y + event.clientY - state.drag.startY;
        saveJSON(`${storagePrefix}:canvas:${version}`, state.canvas);
        applyCanvasTransform();
      }
    });
    document.addEventListener("pointerup", () => { state.drag = null; document.getElementById("canvasViewport").classList.remove("dragging"); });

    const viewport = document.getElementById("canvasViewport");
    viewport.addEventListener("pointerdown", event => {
      if (event.target !== viewport) return;
      state.drag = { type: "pan", startX: event.clientX, startY: event.clientY, x: state.canvas.x, y: state.canvas.y };
      viewport.classList.add("dragging");
    });
    viewport.addEventListener("wheel", event => {
      event.preventDefault();
      const delta = event.deltaY > 0 ? -0.08 : 0.08;
      state.canvas.scale = Math.min(1.6, Math.max(0.55, state.canvas.scale + delta));
      saveJSON(`${storagePrefix}:canvas:${version}`, state.canvas);
      applyCanvasTransform();
    }, { passive: false });

    function zoom(delta) {
      state.canvas.scale = Math.min(1.6, Math.max(0.55, state.canvas.scale + delta));
      saveJSON(`${storagePrefix}:canvas:${version}`, state.canvas);
      applyCanvasTransform();
    }
    function resetCanvas() {
      state.canvas = { scale: 1, x: 40, y: 30 };
      state.nodePositions = {
        "frontend-home": { x: 80, y: 120 },
        "frontend-member": { x: 560, y: 120 },
        "frontend-income": { x: 560, y: 760 },
        "frontend-withdraw": { x: 1040, y: 760 },
        "backend-overview": { x: 80, y: 1460 },
        "backend-withdrawals": { x: 560, y: 1460 },
        "backend-rules": { x: 1040, y: 1460 }
      };
      saveJSON(`${storagePrefix}:canvas:${version}`, state.canvas);
      saveJSON(`${storagePrefix}:nodes:${version}`, state.nodePositions);
      renderCanvas();
    }
    function exportHtml() {
      const prototypePattern = new RegExp('<script id="prototypeData" type="application/json">[\\\\s\\\\S]*?<\\\\/script>');
      const notesPattern = new RegExp('<script id="canvasNotesData" type="application/json">[\\\\s\\\\S]*?<\\\\/script>');
      const prototypeBlock = `<script id="prototypeData" type="application/json">${JSON.stringify({ version, updatedAt: new Date().toISOString(), annotations: state.annotations })}<` + `/script>`;
      const notesBlock = `<script id="canvasNotesData" type="application/json">${JSON.stringify({ notes: state.notes })}<` + `/script>`;
      const html = document.documentElement.outerHTML
        .replace(prototypePattern, prototypeBlock)
        .replace(notesPattern, notesBlock);
      const blob = new Blob(["<!doctype html>\\n" + html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "高保真原型_分销模块页面流画布原型_v3_20260621_导出.html";
      a.click();
      URL.revokeObjectURL(url);
    }

    document.querySelectorAll("[data-mode]").forEach(btn => btn.addEventListener("click", () => setMode(btn.dataset.mode)));
    document.querySelectorAll("[data-page]").forEach(btn => btn.addEventListener("click", () => setPage(btn.dataset.page)));
    document.getElementById("toggleMarks").addEventListener("click", event => {
      state.marks = !state.marks;
      event.currentTarget.textContent = state.marks ? "隐藏标注" : "显示标注";
      localStorage.setItem(`${storagePrefix}:marks:${version}`, state.marks ? "visible" : "hidden");
      renderInteractive();
    });
    document.getElementById("exportHtml").addEventListener("click", exportHtml);
    document.querySelector("[data-canvas-action='zoom-out']").addEventListener("click", () => zoom(-0.12));
    document.querySelector("[data-canvas-action='zoom-in']").addEventListener("click", () => zoom(0.12));
    document.querySelector("[data-canvas-action='reset']").addEventListener("click", resetCanvas);
    document.querySelector("[data-canvas-action='add-note']").addEventListener("click", addNote);

    renderInteractive();
    setMode(state.mode);
  </script>
</body>
</html>
