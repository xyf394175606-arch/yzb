      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 12px;
    }
    .lb-sheet-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .lb-sheet-options span {
      padding: 6px 10px;
      border-radius: 999px;
      background: #F8FAFC;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .lb-sheet-options span.active { background: var(--soft-blue); color: var(--blue); }
    .mobile-primary-bar {
      position: sticky;
      bottom: 0;
      background: #fff;
      border-top: 1px solid var(--line);
      padding-top: 12px;
      display: grid;
      gap: 8px;
    }
    .filter-bar {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr)) auto auto;
      gap: 10px;
      align-items: end;
    }
    .filter-bar .field { gap: 4px; }
    .filter-bar input, .filter-bar select { height: 36px; }
    .risk-confirm {
      border: 1px solid #FCA5A5;
      background: #FFF1F2;
      color: #991B1B;
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 6px;
    }
    .skeleton {
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, #eef2f7, #d9e2ef, #eef2f7);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite linear;
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    .state-screen {
      min-height: 320px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fbfcff;
    }
    .state-screen h3 { margin: 10px 0 6px; font-size: 20px; }
    .state-icon {
      width: 54px;
      height: 54px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--soft-blue);
      color: var(--blue);
      font-size: 24px;
      font-weight: 750;
    }
    .kpi { display: grid; gap: 4px; }
    .split { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(320px, .9fr); gap: 14px; }
    .footer-note {
      color: var(--muted);
      font-size: 12px;
      padding: 0 16px 16px;
    }
    @media (max-width: 1000px) {
      .topbar-inner { grid-template-columns: 1fr; }
      .persona { justify-content: space-between; }
      .layout { grid-template-columns: 1fr; }
      .side { position: static; }
      .grid.cols-2, .grid.cols-3, .grid.cols-4, .split { grid-template-columns: 1fr; }
      .filter-bar { grid-template-columns: 1fr; }
      .page-head { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
    }
    @media (max-width: 560px) {
      .topbar-inner, .layout { padding-left: 10px; padding-right: 10px; }
      .brand-title { white-space: normal; }
      .page-title { font-size: 18px; }
      .content { padding: 10px; }
      .row { grid-template-columns: 1fr; }
      .mobile-shell { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="mark">K12</div>
          <div>
            <div class="brand-title">领榜教育 / 优坐标高保真原型</div>
            <div class="brand-sub">微信小程序形态 HTML v3 · 20260604</div>
          </div>
        </div>
        <div class="segmented" id="workspaceTabs"></div>
        <div class="persona">
          <span>当前角色</span>
          <select id="roleSelect" class="btn" aria-label="切换角色"></select>
        </div>
      </div>
    </header>
    <div class="layout">
      <aside class="side">
        <div class="side-head">
          <div class="side-title" id="sideTitle">页面导航</div>
          <div class="side-note" id="sideNote">点击切换页面，状态栏切换页面状态</div>
        </div>
        <nav class="nav-list" id="pageNav"></nav>
      </aside>
      <main class="main">
        <div class="status-bar" id="stateBar"></div>
        <section class="page" id="pageRoot"></section>
      </main>
    </div>
  </div>
  <script>
    const state = {
      workspace: "lbParent",
      page: "lbParentHome",
      role: "领榜家长",
      mode: "normal",
      asyncText: ""
    };

    const workspaces = {
      lbParent: {
        label: "领榜家长端",
        note: "发布需求、查看需求状态，不做系统内确认老师",
        roles: ["领榜家长", "非本人访客"],
        pages: [
          ["lbParentHome", "家长首页", "入口"],
          ["lbPublish", "发布需求", "表单"],
          ["lbMyDemands", "我的需求", "列表"],
          ["lbDemandDetail", "需求详情", "详情"]
        ]
      },
      lbTeacher: {
        label: "领榜老师端",
        note: "查看可抢需求，未认证提醒但不阻断付款接单",
        roles: ["领榜老师-已认证", "领榜老师-未认证", "非老师账号"],
        pages: [
          ["lbTeacherHome", "老师首页", "入口"],
          ["lbDemandList", "可抢需求", "列表"],
          ["lbAcceptDetail", "需求详情", "接单"],
          ["lbAcceptResult", "接单结果", "结果"],
          ["lbTeacherApply", "老师入驻认证", "三步"],
          ["lbMyOrders", "我的接单", "列表"]
        ]
      },
      lbAdmin: {
        label: "领榜后台",
        note: "独立后台，只管理领榜需求、监管、异常和分销财务",
        roles: ["领榜客服", "领榜管理员", "领榜财务", "优坐标客服"],
        pages: [
          ["lbAdminHome", "后台首页", "看板"],
          ["lbDemandManage", "需求单管理", "表格"],
          ["lbTeacherAudit", "老师认证审核", "审核"],
          ["lbWecom", "企微监管记录", "留痕"],
          ["lbException", "异常处理", "重新开放"],
          ["lbPush", "推送提醒", "客服"],
          ["lbFinance", "分销财务", "财务"]
        ]
      },
      uzParent: {
        label: "优坐标家长端",
        note: "老师关联产品、直接产品、会员卡三条购买路径",
        roles: ["优坐标家长", "非本人访客"],
        pages: [
          ["uzParentHome", "家长首页", "入口"],
          ["uzTeacher", "老师详情", "老师路径"],
          ["uzProduct", "产品详情", "产品路径"],
          ["uzMember", "会员卡权益", "会员"],
          ["uzOrder", "订单详情", "进度"]
        ]
      },
      uzTeacher: {
        label: "优坐标老师端",
        note: "MVP 只读查看客服分配的上课安排，不做确认接课",
        roles: ["优坐标老师", "非本人老师"],
        pages: [
          ["uzTeacherHome", "老师首页", "入口"],
          ["uzScheduleReadonly", "我的上课安排", "只读"],
          ["uzScheduleDetail", "安排详情", "详情"]
        ]
      },
      uzAdmin: {
        label: "优坐标后台",
        note: "独立后台，客服约课、分配老师、替换留痕、最小排课",
        roles: ["优坐标客服", "优坐标管理员", "优坐标财务", "领榜客服"],
        pages: [
          ["uzAdminHome", "后台首页", "看板"],
          ["uzOrders", "订单管理", "表格"],
          ["uzAppointment", "待约课订单", "客服"],
          ["uzAssign", "老师分配", "分配"],
          ["uzReplace", "替换留痕", "系统外确认"],
          ["uzSchedule", "上课安排", "排课"],
          ["uzFinance", "分销财务", "财务"]
        ]
      }
    };

    const modes = [
      ["normal", "正常"],
      ["empty", "空"],
      ["loading", "加载"],
      ["error", "错误"],
      ["forbidden", "无权限"],
      ["abnormal", "业务异常"],
      ["async-processing", "异步处理中"],
      ["async-done", "异步完成"],
      ["async-failed", "异步失败"]
    ];

    const mock = {
      lbDemand: { demandId: "LB-D-1001", summary: "初二数学周末辅导", subject: "数学", grade: "初二", city: "杭州", hourlyFee: 200, purchaseAmount: 600, status: "抢单中", updatedAt: "2026-06-03 10:20" },
      lbDemand2: { demandId: "LB-D-1002", summary: "初三英语冲刺", subject: "英语", grade: "初三", hourlyFee: 200, purchaseAmount: 600, certificationStatus: "not_submitted", certificationReminder: "请尽快提交认证资料，认证成功后可正常接单", canPayAndAccept: true },
      lbWecom: { supervisionId: "LB-W-2001", teacherName: "王老师", demandId: "LB-D-1001", status: "监管中", serviceNote: "已拉群，等待沟通结果" },
      lbPush: { pushId: "LB-PUSH-01", channels: ["微信服务号", "企业微信机器人", "短信通知"], filter: { subject: "数学", grade: "初二" }, targetCount: 3, status: "发送成功", operator: "客服A", sentAt: "2026-06-03 15:00", nextPushAt: "2026-06-06 15:00" },
      uzOrder: { orderId: "UZ-O-1001", purchaseType: "teacher_product", status: "已购买", appointmentStatus: "待约课", teacherName: "陈老师" },
      uzNormalMember: { membershipOrderId: "UZ-MO-01", cardName: "普通会员", memberLevel: "normal", publicPrice: 199, memberPrice: 129, normalRemainingPurchaseCount: 3, benefitStatus: "已开通" },
      uzExcellentMember: { membershipOrderId: "UZ-MO-02", cardName: "卓越会员", memberLevel: "excellent", validUntil: "2027-06-03", publicPrice: 199, memberPrice: 129, excellentRemainingLessonQuota: 100, benefitStatus: "已开通" },
      uzCandidate: { appointmentId: "UZ-A-1001", preferredTeacher: "陈老师", candidates: [{ teacherId: "UZ-T-09", name: "李老师", availability: "可承接" }] },
      uzReplace: { originalTeacher: "陈老师", replacementTeacher: "李老师", confirmedAt: "2026-06-03 15:20", operator: "客服B", note: "已电话联系家长确认" },
      uzSchedule: { scheduleId: "UZ-S-1001", time: "2026-06-08 19:00", teacherName: "李老师", parentName: "张家长", status: "已安排", thirdPartySyncStatus: "待同步" },
      uzScheduleFail: { scheduleId: "UZ-S-1002", thirdPartySyncStatus: "同步失败", syncFailureReason: "第三方接口返回失败", retryStatus: "可重试" },
      commission: { projectCode: "lingbang", commissionType: "销售提成", status: "佣金候选", ruleDisplay: "领榜默认：自销40%、邀家长10%、邀老师10%、招代理10%、老师二级5%、代理二级5%、总部20%", attributionSource: "sales_share_link", amountDisplay: "待结算", commissionBaseType: "分佣基数待财务确认" },
      withdrawal: { withdrawalId: "WD-1001", applicant: "王老师", amount: 300, status: "审核中", projectCode: "youzuobiao" }
    };

    const pageRenderers = {
      lbParentHome, lbPublish, lbMyDemands, lbDemandDetail,
      lbTeacherHome, lbDemandList, lbAcceptDetail, lbAcceptResult, lbTeacherApply, lbMyOrders,
      lbAdminHome, lbDemandManage, lbTeacherAudit, lbWecom, lbException, lbPush, lbFinance,
      uzParentHome, uzTeacher, uzProduct, uzMember, uzOrder,
      uzTeacherHome, uzScheduleReadonly, uzScheduleDetail,
      uzAdminHome, uzOrders, uzAppointment, uzAssign, uzReplace, uzSchedule, uzFinance
    };

    function boot() {
      renderWorkspaceTabs();
      syncRole();
      renderNav();
      renderStateBar();
      renderPage();
    }

    function renderWorkspaceTabs() {
      const root = document.getElementById("workspaceTabs");
      root.innerHTML = Object.entries(workspaces).map(([key, ws]) => (
        `<button class="${key === state.workspace ? "active" : ""}" onclick="setWorkspace('${key}')">${ws.label}</button>`
      )).join("");
    }

    function syncRole() {
      const ws = workspaces[state.workspace];
      if (!ws.roles.includes(state.role)) state.role = ws.roles[0];
      const select = document.getElementById("roleSelect");
      select.innerHTML = ws.roles.map(role => `<option ${role === state.role ? "selected" : ""}>${role}</option>`).join("");
      select.onchange = event => {
        state.role = event.target.value;
        state.mode = state.role.includes("非") || state.role.includes("优坐标客服") && state.workspace === "lbAdmin" || state.role.includes("领榜客服") && state.workspace === "uzAdmin" ? "forbidden" : "normal";
        renderStateBar();
        renderPage();
      };
    }

    function renderNav() {
      const ws = workspaces[state.workspace];
      document.getElementById("sideTitle").textContent = ws.label;
      document.getElementById("sideNote").textContent = ws.note;
      document.getElementById("pageNav").innerHTML = ws.pages.map(([id, label, type]) => (
        `<button class="nav-btn ${id === state.page ? "active" : ""}" onclick="setPage('${id}')"><span>${label}</span><small>${type}</small></button>`
      )).join("");
    }

    function renderStateBar() {
      document.getElementById("stateBar").innerHTML = `<span>状态样例</span>` + modes.map(([key, label]) =>
        `<button class="chip-btn ${key === state.mode ? "active" : ""}" onclick="setMode('${key}')">${label}</button>`
      ).join("");
    }

    function setWorkspace(key) {
      state.workspace = key;
      state.page = workspaces[key].pages[0][0];
      state.mode = "normal";
      renderWorkspaceTabs();
      syncRole();
      renderNav();
      renderStateBar();
      renderPage();
    }

    function setPage(page) {
      state.page = page;
      state.mode = "normal";
      renderNav();
      renderStateBar();
      renderPage();
    }

    function setMode(mode) {
      state.mode = mode;
      renderStateBar();
      renderPage();
    }

    function runAsync(doneMode = "async-done", text = "处理中") {
      state.mode = "async-processing";
      state.asyncText = text;
      renderStateBar();
      renderPage();
      window.setTimeout(() => {
        state.mode = doneMode;
        renderStateBar();
        renderPage();
      }, 1200);
    }

    function renderPage() {
      const renderer = pageRenderers[state.page] || lbParentHome;
      document.getElementById("pageRoot").innerHTML = renderer();
    }

    function frame(title, sub, body, actions = "") {
      return `
        <div class="page-head">
          <div>
            <h1 class="page-title">${title}</h1>
            <div class="page-sub">${sub}</div>
          </div>
          <div class="actions">${actions}</div>
        </div>
        <div class="content">${stateBlock() || body}</div>
        <div class="footer-note">原型依据 09 数据交互 mock 数据和状态样例；当前页面状态可通过上方状态栏切换。</div>
      `;
    }

    function stateBlock() {
      if (state.mode === "normal") return "";
      if (state.mode === "loading") return skeleton("正在读取页面数据");
      if (state.mode === "empty") return stateScreen("空状态", emptyText(), "返回主入口", "blue");
      if (state.mode === "error") return stateScreen("读取失败", "页面数据读取失败，请重试。", "重试", "rose");
      if (state.mode === "forbidden") return stateScreen("无权限", forbiddenText(), "返回所属入口", "amber");
      if (state.mode === "abnormal") return abnormalBlock();
      if (state.mode === "async-processing") return skeleton(state.asyncText || "异步任务处理中");
      if (state.mode === "async-done") return stateScreen("异步完成", asyncDoneText(), "查看最新状态", "green");
      if (state.mode === "async-failed") return stateScreen("异步失败", asyncFailText(), "重试或人工处理", "rose");
      return "";
    }

    function stateScreen(title, text, action, tone) {
      return `<div class="state-screen"><div><div class="state-icon">${tone === "rose" ? "!" : tone === "green" ? "✓" : "i"}</div><h3>${title}</h3><p class="muted">${text}</p><button class="btn primary" onclick="setMode('normal')">${action}</button></div></div>`;
    }

    function skeleton(text) {
      return `<div class="grid"><div class="notice blue"><strong>${text}</strong><span>保留上次结果，等待接口或异步任务返回。</span></div><div class="card"><div class="skeleton" style="width:42%"></div><br><div class="skeleton" style="width:80%"></div><br><div class="skeleton" style="width:66%"></div><br><div class="skeleton" style="width:92%"></div></div><div class="grid cols-3"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div></div>`;
    }

    function emptyText() {
      if (state.page.includes("Demand") || state.page.includes("需求")) return "暂无需求或可抢需求，可通过主入口创建或刷新。";
      if (state.page.includes("Finance") || state.page.includes("佣金")) return "暂无佣金、提现或审核记录。";
      if (state.page.includes("Schedule") || state.page.includes("安排")) return "暂无上课安排。";
      return "当前筛选条件下暂无数据。";
    }

    function forbiddenText() {
      if (state.workspace === "lbAdmin") return `当前身份：${state.role}。缺失权限：领榜后台访问或管理权限。可联系对象：领榜管理员。`;
      if (state.workspace === "uzAdmin") return `当前身份：${state.role}。缺失权限：优坐标后台访问或管理权限。可联系对象：优坐标管理员。`;
      if (state.page.includes("Finance")) return `当前身份：${state.role}。缺失权限：财务审核权限。可联系对象：所属项目财务或管理员。`;
      return `当前身份：${state.role}。缺失权限：该页面的读取或操作权限。可联系对象：所属项目管理员。`;
    }

    function abnormalBlock() {
      const map = {
        lbAcceptDetail: ["需求已被其他老师锁定", "按钮禁用，返回列表刷新。"],
        lbTeacherAudit: ["认证资料不完整", "退回补充只影响老师认证状态，不改变未认证老师可查看并付款接单的规则。"],
        lbException: ["需求已重新开放", "退款责任和财务归属为系统外事项，系统内不做退款闭环。"],
        lbPush: ["未到可推送时间", "同一需求暂按 3 天一次，单次/每日数量上限按后台配置展示，不写死。"],
        uzMember: ["权益不足", "普通会员优惠购课次数不足或卓越会员课时购买机会不足，请联系客服。"],
        uzAssign: ["指定老师不可承接", "进入替换老师路径，由客服系统外联系家长确认并留痕。"],
        uzReplace: ["确认缺失", "必须记录已联系家长确认、确认时间、客服和备注。"],
        uzSchedule: ["第三方同步冲突", "当前仅预留 API 同步状态，冲突交由客服处理。"],
        uzFinance: ["打款异常", "提现为系统外打款，财务跟进并记录结果。"],
        lbFinance: ["分佣基数待确认", "领榜默认比例已确认并可后台调整；基数口径待财务确认。"]
      };
      const [title, text] = map[state.page] || ["业务异常", "当前业务状态异常，请按页面提示返回、重试或人工处理。"];
      return `<div class="notice rose"><strong>${title}</strong><span>${text}</span></div>${normalHint()}`;
    }

    function asyncDoneText() {
      if (state.page === "lbAcceptResult" || state.page === "lbAcceptDetail") return "接单成功，需求已锁定，客服后续在系统外拉企业微信群监管。";
      if (state.page === "lbTeacherAudit") return "老师认证审核结果已保存，列表状态已刷新。";
      if (state.page === "lbPush") return "推送发送成功，渠道为微信服务号、企业微信机器人、短信通知，下次可推送时间已刷新。";
      if (state.page === "uzSchedule") return "第三方排课同步状态已刷新，当前展示最小排课闭环结果。";
      return "异步任务已完成，页面已刷新最新状态。";
    }

    function asyncFailText() {
      if (state.page === "uzSchedule") return "第三方排课同步失败，可重试；具体 API 协议和认证方式待技术后续细化。";
      if (state.page === "lbAcceptResult") return "需求已被其他老师锁定，请返回列表刷新。";
      return "任务处理失败，请重试或转人工处理。";
    }

    function normalHint() {
      return `<div class="notice blue"><strong>原型边界</strong><span>此状态只展示业务承接和提示，不修改上游规则。</span></div>`;
    }

    function tag(text, tone = "") { return `<span class="tag ${tone}">${text}</span>`; }
    function money(n) { return `¥${n}`; }
    function field(label, value) { return `<div class="field"><label>${label}</label><input value="${value}"></div>`; }

    function lbParentHome() {
      return frame("领榜家长首页", "家长发布家教需求并查看自己的需求进度；不提供系统内确认老师入口。", `
        <div class="mobile-shell lb-phone">
          <div class="mobile-top"><span>杭州</span><strong>领榜教育</strong><span>••</span></div>
          <div class="mobile-body">
            <div class="lb-hero">
              <small>领榜教育 · C2C 家教需求平台</small>
              <strong>专注家教13年</strong>

                <div class="step"><span class="dot"></span><div>客服分配老师并形成上课安排</div></div>
              </div>
            </div>
          </div>
          <div class="mobile-bottom"><button onclick="setPage('uzParentHome')"><span class="tab-icon">首</span>首页</button><button class="active"><span class="tab-icon">单</span>订单</button><button onclick="setPage('uzMember')"><span class="tab-icon">会</span>会员</button></div>
        </div>
      `);
    }

    function uzTeacherHome() {
      return frame("优坐标老师端首页", "老师端只读查看客服分配的上课安排，不做确认接课。", `
        <div class="mobile-shell">
          <div class="mobile-top"><span>今日</span><strong>优坐标老师端</strong><span>••</span></div>
          <div class="mobile-body">
            <div class="card soft-green"><div class="card-title">今日安排</div><div class="big-num">2</div><div class="muted">由客服后台直接分配</div></div>
            <button class="btn primary" onclick="setPage('uzScheduleReadonly')">查看我的上课安排</button>
            <div class="notice amber"><strong>MVP 边界</strong><span>当前不做老师端确认接课或拒绝接课动作。</span></div>
          </div>
          <div class="mobile-bottom"><button class="active"><span class="tab-icon">首</span>首页</button><button onclick="setPage('uzScheduleReadonly')"><span class="tab-icon">课</span>安排</button><button onclick="setPage('uzScheduleDetail')"><span class="tab-icon">详</span>详情</button></div>
        </div>
      `);
    }

    function uzScheduleReadonly() {
      return frame("我的上课安排页", "老师只读查看本人安排，不能确认、替换或修改排课。", `
        <div class="mobile-shell">
          <div class="mobile-top"><span onclick="setPage('uzTeacherHome')">‹</span><strong>我的安排</strong><span>••</span></div>
          <div class="mobile-body">
            <div class="mini-cells">
              <div class="mini-cell"><div><div class="mini-cell-title">${mock.uzSchedule.time}</div><div class="mini-cell-desc">${mock.uzSchedule.parentName} · ${mock.uzSchedule.status}</div></div><button class="btn" onclick="setPage('uzScheduleDetail')">详情</button></div>
              <div class="mini-cell"><div><div class="mini-cell-title">2026-06-09 20:00</div><div class="mini-cell-desc">李家长 · 同步失败待客服处理</div></div><span class="mini-cell-value">同步失败</span></div>
            </div>
          </div>
          <div class="mobile-bottom"><button onclick="setPage('uzTeacherHome')"><span class="tab-icon">首</span>首页</button><button class="active"><span class="tab-icon">课</span>安排</button><button onclick="setPage('uzScheduleDetail')"><span class="tab-icon">详</span>详情</button></div>
        </div>
      `);
    }

    function uzScheduleDetail() {
      return frame("上课安排详情页", "展示安排结果和第三方同步状态；老师端不提供确认接课按钮。", `
        <div class="mobile-shell">
          <div class="mobile-top"><span onclick="setPage('uzScheduleReadonly')">‹</span><strong>安排详情</strong><span>••</span></div>
          <div class="mobile-body">
            <div class="card"><div class="card-title">安排信息</div><p>${mock.uzSchedule.time} · ${mock.uzSchedule.teacherName} · ${mock.uzSchedule.parentName}</p><p>第三方同步状态：${tag(mock.uzSchedule.thirdPartySyncStatus, "amber")}</p></div>
            <div class="notice blue"><strong>只读说明</strong><span>老师端仅查看安排，不做确认接课。</span></div>
          </div>
          <div class="mobile-bottom"><button onclick="setPage('uzTeacherHome')"><span class="tab-icon">首</span>首页</button><button onclick="setPage('uzScheduleReadonly')"><span class="tab-icon">课</span>安排</button><button class="active"><span class="tab-icon">详</span>详情</button></div>
        </div>
      `);
    }

    function uzAdminHome() {
      return frame("优坐标后台首页", "优坐标独立后台总入口，覆盖订单、约课、老师分配、排课同步和财务。", `
        <div class="grid cols-4">
          <div class="card soft-blue"><div class="muted">待约课</div><div class="big-num">18</div></div>
          <div class="card soft-teal"><div class="muted">待分配</div><div class="big-num">7</div></div>
          <div class="card soft-amber"><div class="muted">替换确认中</div><div class="big-num">3</div></div>
          <div class="card soft-rose"><div class="muted">同步失败</div><div class="big-num">2</div></div>
        </div>
        <div class="notice blue"><strong>后台隔离</strong><span>当前后台只管理优坐标产品、会员、订单和排课，不出现领榜需求或领榜抢单。</span></div>
      `);
    }

    function uzOrders() {
      return frame("订单管理页", "管理产品、老师关联产品和会员订单；会员卡订单不进入约课。", `
        <div class="filter-bar">
          <div class="field"><label>关键词</label><input value="UZ-O"></div>
          <div class="field"><label>状态</label><select><option>全部状态</option><option>待约课</option><option>已购买</option></select></div>
          <div class="field"><label>负责人</label><input value="客服B"></div>
          <div class="field"><label>时间</label><input value="2026-06-03"></div>
          <button class="btn">重置</button><button class="btn primary">查询</button>
        </div>
        <div class="table-wrap"><table><thead><tr><th>订单</th><th>购买类型</th><th>状态</th><th>下一步</th></tr></thead><tbody>
          <tr><td>UZ-O-1001</td><td>老师关联产品</td><td>${tag("已购买", "green")}</td><td><button class="btn" onclick="setPage('uzAppointment')">进入约课</button></td></tr>
          <tr><td>UZ-O-1002</td><td>直接产品</td><td>${tag("待约课", "amber")}</td><td><button class="btn" onclick="setPage('uzAppointment')">处理</button></td></tr>
          <tr><td>UZ-MO-02</td><td>卓越会员</td><td>${tag("权益已开通", "teal")}</td><td>不进入约课</td></tr>
        </tbody></table></div>
      `);
    }

    function uzAppointment() {
      return frame("待约课订单页", "客服处理购买后待约课队列，系统外联系家长并保存约课结果。", `
        <div class="split">
          <div class="table-wrap"><table><thead><tr><th>订单</th><th>家长</th><th>购买类型</th><th>状态</th><th>操作</th></tr></thead><tbody>
            <tr><td>UZ-O-1001</td><td>张家长</td><td>老师关联产品</td><td>${tag("待联系", "amber")}</td><td><button class="btn" onclick="setPage('uzAssign')">记录约课</button></td></tr>
          </tbody></table></div>
          <div class="drawer"><div class="card-title">约课记录</div><div class="field"><label>约定时间</label><input value="2026-06-08 19:00"></div><div class="field"><label>沟通结果</label><textarea>已电话确认时间。</textarea></div><button class="btn primary" onclick="runAsync('async-done','正在保存约课记录')">保存</button></div>
        </div>
      `);
    }

    function uzAssign() {
      return frame("老师分配页", "客服优先选择指定老师，指定老师不可承接时进入替换路径。", `
        <div class="split">
          <div class="card">
            <div class="card-title">约课上下文 ${mock.uzCandidate.appointmentId}</div>
            <p>家长偏好老师：${mock.uzCandidate.preferredTeacher}</p>
            <div class="table-wrap"><table><thead><tr><th>候选老师</th><th>可承接状态</th><th>操作</th></tr></thead><tbody>
              <tr><td>陈老师</td><td>${tag("不可承接", "rose")}</td><td><button class="btn warn" onclick="setPage('uzReplace')">替换老师</button></td></tr>
              <tr><td>${mock.uzCandidate.candidates[0].name}</td><td>${tag("可承接", "green")}</td><td><button class="btn primary" onclick="runAsync('async-done','正在形成上课安排')">分配</button></td></tr>
            </tbody></table></div>
          </div>
          <div class="card soft-amber"><div class="card-title">替换边界</div><p>如果家长指定过老师，客服替换老师需要系统外联系家长确认；系统内只记录“已联系家长确认”、确认时间、客服、备注。</p></div>
        </div>
      `);
    }

    function uzReplace() {
      return frame("老师替换记录页", "不做家长端二次确认，只由客服记录系统外确认留痕。", `
        <div class="split">
          <div class="card">
            <div class="grid cols-2">${field("原指定老师", mock.uzReplace.originalTeacher)}${field("替换老师", mock.uzReplace.replacementTeacher)}</div>
            <div class="grid cols-2">${field("确认时间", mock.uzReplace.confirmedAt)}${field("客服", mock.uzReplace.operator)}</div>
            <div class="field"><label>备注</label><textarea>${mock.uzReplace.note}</textarea></div>
            <button class="btn primary" onclick="runAsync('async-done','正在保存替换确认留痕')">保存并形成安排</button>
          </div>
          <div class="card"><div class="card-title">历史记录</div><p>${mock.uzReplace.confirmedAt} · ${mock.uzReplace.operator} · ${mock.uzReplace.note}</p><div class="notice blue"><strong>截图录音</strong><span>当前不强制上传截图或录音。</span></div></div>
        </div>
      `);
    }

    function uzSchedule() {
      return frame("上课安排页", "展示最小排课结果，并预留第三方 API 同步中、失败、重试、冲突状态。", `
        <div class="table-wrap"><table><thead><tr><th>安排</th><th>时间</th><th>老师</th><th>家长</th><th>状态</th><th>第三方同步</th><th>操作</th></tr></thead><tbody>
          <tr><td>${mock.uzSchedule.scheduleId}</td><td>${mock.uzSchedule.time}</td><td>${mock.uzSchedule.teacherName}</td><td>${mock.uzSchedule.parentName}</td><td>${tag("已安排", "green")}</td><td>${tag("待同步", "amber")}</td><td><button class="btn" onclick="runAsync('async-done','正在同步第三方排课')">同步</button></td></tr>
          <tr><td>${mock.uzScheduleFail.scheduleId}</td><td>2026-06-09 20:00</td><td>李老师</td><td>刘家长</td><td>${tag("已安排", "green")}</td><td>${tag("同步失败", "rose")}</td><td><button class="btn danger" onclick="runAsync('async-failed','正在重试第三方排课同步')">重试</button></td></tr>
        </tbody></table></div>
      `, `<button class="btn" onclick="setMode('async-processing')">同步中</button><button class="btn" onclick="setMode('async-failed')">同步失败</button><button class="btn" onclick="setMode('abnormal')">同步冲突</button>`);
    }

    function uzFinance() {
      return financeFrame("优坐标分销财务页", "优坐标分销、佣金、提现独立于领榜；财务审核，管理员查看复核，客服无权。", "youzuobiao");
    }

    function financeFrame(title, sub, projectCode) {
      const isFinance = state.role.includes("财务");
      const isCustomerService = state.role.includes("客服");
      return frame(title, sub, `
        <div class="grid cols-3">
          <div class="card soft-blue"><div class="muted">候选佣金</div><div class="big-num">16</div></div>
          <div class="card soft-green"><div class="muted">可提现</div><div class="big-num">8</div></div>
          <div class="card soft-amber"><div class="muted">审核中</div><div class="big-num">3</div></div>
        </div>
        ${projectCode === "lingbang" ? `
        <div class="notice blue"><strong>领榜默认分佣</strong><span>代理大学生自销 40%；邀请家长注册 10%；邀请老师注册 10%；招聘代理 10%；老师二级代理 5%；代理二级 5%；总部 20%。</span></div>
        <div class="notice amber"><strong>财务口径</strong><span>以上比例后续可后台配置调整；分佣基数按成交额、平台服务费或可分佣金额计算仍待财务确认。</span></div>` : `
        <div class="notice blue"><strong>配置规则</strong><span>优坐标一级/二级销售提成比例、注册奖励、课消提成按后台配置计算。</span></div>`}
        <div class="filter-bar">
          <div class="field"><label>关键词</label><input value="WD"></div>
          <div class="field"><label>状态</label><select><option>审核中</option><option>待打款</option><option>已到账</option></select></div>
          <div class="field"><label>负责人</label><input value="财务"></div>
          <div class="field"><label>时间</label><input value="2026-06-03"></div>
          <button class="btn">重置</button><button class="btn primary">查询</button>
        </div>
        <div class="risk-confirm">
          <strong>提现审核风险提示</strong>
          <span>操作对象：提现申请 WD-1001。影响范围：审核通过后进入系统外打款。是否可撤销：打款前可驳回；系统外打款完成后仅记录异常或冲正。</span>
        </div>
        <div class="table-wrap"><table><thead><tr><th>类型</th><th>所属项目</th><th>状态</th><th>金额展示</th><th>归因</th><th>操作</th></tr></thead><tbody>
          <tr><td>${mock.commission.commissionType}</td><td>${projectCode}</td><td>${tag(mock.commission.status, "blue")}</td><td>${mock.commission.amountDisplay}</td><td>购买分享链接归因</td><td><button class="btn" disabled>等待完成或课消</button></td></tr>
          <tr><td>提现申请</td><td>${projectCode}</td><td>${tag(mock.withdrawal.status, "amber")}</td><td>${money(mock.withdrawal.amount)}</td><td>${mock.withdrawal.applicant}</td><td>${isFinance ? `<button class="btn primary" onclick="runAsync('async-done','正在审核提现')">审核</button>` : `<button class="btn" disabled>${isCustomerService ? "客服无审核权限" : "仅财务审核"}</button>`}</td></tr>
          <tr><td>课消提成</td><td>${projectCode}</td><td>${tag("已冲正", "rose")}</td><td>按后台配置</td><td>退款或退单</td><td><button class="btn" disabled>查看</button></td></tr>
        </tbody></table></div>
      `, `<button class="btn" onclick="setMode('forbidden')">客服无权限</button><button class="btn" onclick="setMode('abnormal')">配置缺失</button>`);
    }

    boot();
  </script>
</body>
</html>
