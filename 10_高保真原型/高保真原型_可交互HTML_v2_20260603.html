      withdrawal: { withdrawalId: "WD-1001", applicant: "王老师", amount: 300, status: "审核中", projectCode: "youzuobiao" }
    };

    const pageRenderers = {
      lbParentHome, lbPublish, lbMyDemands, lbDemandDetail,
      lbTeacherHome, lbDemandList, lbAcceptDetail, lbAcceptResult, lbMyOrders,
      lbAdminHome, lbDemandManage, lbWecom, lbException, lbPush, lbFinance,

    };

    function boot() {
      renderWorkspaceTabs();
      syncRole();
      renderNav();
      renderStateBar();
      renderPage();
    }

    function renderWorkspaceTabs() {
      const root = document.getElementById("workspaceTabs");
      root.innerHTML = Object.entries(workspaces).map(([key, ws]) => (
        `<button class="${key === state.workspace ? "active" : ""}" onclick="setWorkspace('${key}')">${ws.label}</button>`
      )).join("");
    }

    function syncRole() {
      const ws = workspaces[state.workspace];
      if (!ws.roles.includes(state.role)) state.role = ws.roles[0];
      const select = document.getElementById("roleSelect");
      select.innerHTML = ws.roles.map(role => `<option ${role === state.role ? "selected" : ""}>${role}</option>`).join("");
      select.onchange = event => {
        state.role = event.target.value;
        state.mode = state.role.includes("非") || state.role.includes("优坐标客服") && state.workspace === "lbAdmin" || state.role.includes("领榜客服") && state.workspace === "uzAdmin" ? "forbidden" : "normal";
        renderStateBar();
        renderPage();
      };
    }

    function renderNav() {
      const ws = workspaces[state.workspace];
      document.getElementById("sideTitle").textContent = ws.label;
      document.getElementById("sideNote").textContent = ws.note;
      document.getElementById("pageNav").innerHTML = ws.pages.map(([id, label, type]) => (
        `<button class="nav-btn ${id === state.page ? "active" : ""}" onclick="setPage('${id}')"><span>${label}</span><small>${type}</small></button>`
      )).join("");
    }

    function renderStateBar() {
      document.getElementById("stateBar").innerHTML = `<span>状态样例</span>` + modes.map(([key, label]) =>
        `<button class="chip-btn ${key === state.mode ? "active" : ""}" onclick="setMode('${key}')">${label}</button>`
      ).join("");
    }

    function setWorkspace(key) {
      state.workspace = key;
      state.page = workspaces[key].pages[0][0];
      state.mode = "normal";
      renderWorkspaceTabs();
      syncRole();
      renderNav();
      renderStateBar();
      renderPage();
    }

    function setPage(page) {
      state.page = page;
      state.mode = "normal";
      renderNav();
      renderStateBar();
      renderPage();
    }

    function setMode(mode) {
      state.mode = mode;
      renderStateBar();
      renderPage();
    }

    function runAsync(doneMode = "async-done", text = "处理中") {
      state.mode = "async-processing";
      state.asyncText = text;
      renderStateBar();
      renderPage();
      window.setTimeout(() => {
        state.mode = doneMode;
        renderStateBar();
        renderPage();
      }, 1200);
    }

    function renderPage() {
      const renderer = pageRenderers[state.page] || lbParentHome;
      document.getElementById("pageRoot").innerHTML = renderer();
    }

    function frame(title, sub, body, actions = "") {
      return `
        <div class="page-head">
          <div>
            <h1 class="page-title">${title}</h1>
            <div class="page-sub">${sub}</div>
          </div>
          <div class="actions">${actions}</div>
        </div>
        <div class="content">${stateBlock() || body}</div>
        <div class="footer-note">原型依据 09 数据交互 mock 数据和状态样例；当前页面状态可通过上方状态栏切换。</div>
      `;
    }

    function stateBlock() {
      if (state.mode === "normal") return "";
      if (state.mode === "loading") return skeleton("正在读取页面数据");
      if (state.mode === "empty") return stateScreen("空状态", emptyText(), "返回主入口", "blue");
      if (state.mode === "error") return stateScreen("读取失败", "页面数据读取失败，请重试。", "重试", "rose");
      if (state.mode === "forbidden") return stateScreen("无权限", forbiddenText(), "返回所属入口", "amber");
      if (state.mode === "abnormal") return abnormalBlock();
      if (state.mode === "async-processing") return skeleton(state.asyncText || "异步任务处理中");
      if (state.mode === "async-done") return stateScreen("异步完成", asyncDoneText(), "查看最新状态", "green");
      if (state.mode === "async-failed") return stateScreen("异步失败", asyncFailText(), "重试或人工处理", "rose");
      return "";
    }

    function stateScreen(title, text, action, tone) {
      return `<div class="state-screen"><div><div class="state-icon">${tone === "rose" ? "!" : tone === "green" ? "✓" : "i"}</div><h3>${title}</h3><p class="muted">${text}</p><button class="btn primary" onclick="setMode('normal')">${action}</button></div></div>`;
    }

    function skeleton(text) {
      return `<div class="grid"><div class="notice blue"><strong>${text}</strong><span>保留上次结果，等待接口或异步任务返回。</span></div><div class="card"><div class="skeleton" style="width:42%"></div><br><div class="skeleton" style="width:80%"></div><br><div class="skeleton" style="width:66%"></div><br><div class="skeleton" style="width:92%"></div></div><div class="grid cols-3"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div></div>`;
    }

    function emptyText() {
      if (state.page.includes("Demand") || state.page.includes("需求")) return "暂无需求或可抢需求，可通过主入口创建或刷新。";
      if (state.page.includes("Finance") || state.page.includes("佣金")) return "暂无佣金、提现或审核记录。";
      if (state.page.includes("Schedule") || state.page.includes("安排")) return "暂无上课安排。";
      return "当前筛选条件下暂无数据。";
    }

    function forbiddenText() {
      if (state.workspace === "lbAdmin") return `当前身份：${state.role}。缺失权限：领榜后台访问或管理权限。可联系对象：领榜管理员。`;
      if (state.workspace === "uzAdmin") return `当前身份：${state.role}。缺失权限：优坐标后台访问或管理权限。可联系对象：优坐标管理员。`;
      if (state.page.includes("Finance")) return `当前身份：${state.role}。缺失权限：财务审核权限。可联系对象：所属项目财务或管理员。`;
      return `当前身份：${state.role}。缺失权限：该页面的读取或操作权限。可联系对象：所属项目管理员。`;
    }

    function abnormalBlock() {
      const map = {
        lbAcceptDetail: ["需求已被其他老师锁定", "按钮禁用，返回列表刷新。"],
        lbException: ["需求已重新开放", "退款责任和财务归属为系统外事项，系统内不做退款闭环。"],
        lbPush: ["未到可推送时间", "同一需求暂按 3 天一次，单次/每日数量上限按后台配置展示，不写死。"],
        uzMember: ["权益不足", "普通会员优惠购课次数不足或卓越会员课时购买机会不足，请联系客服。"],
        uzAssign: ["指定老师不可承接", "进入替换老师路径，由客服系统外联系家长确认并留痕。"],
        uzReplace: ["确认缺失", "必须记录已联系家长确认、确认时间、客服和备注。"],
        uzSchedule: ["第三方同步冲突", "当前仅预留 API 同步状态，冲突交由客服处理。"],
        uzFinance: ["打款异常", "提现为系统外打款，财务跟进并记录结果。"],
        lbFinance: ["佣金配置缺失", "比例、注册奖励、课消提成按后台配置，不写死。"]
      };
      const [title, text] = map[state.page] || ["业务异常", "当前业务状态异常，请按页面提示返回、重试或人工处理。"];
      return `<div class="notice rose"><strong>${title}</strong><span>${text}</span></div>${normalHint()}`;
    }

    function asyncDoneText() {
      if (state.page === "lbAcceptResult" || state.page === "lbAcceptDetail") return "接单成功，需求已锁定，客服后续在系统外拉企业微信群监管。";

      if (state.page === "uzSchedule") return "第三方排课同步状态已刷新，当前展示最小排课闭环结果。";
      return "异步任务已完成，页面已刷新最新状态。";
    }

    function asyncFailText() {
      if (state.page === "uzSchedule") return "第三方排课同步失败，可重试；具体 API 协议和认证方式待技术后续细化。";
      if (state.page === "lbAcceptResult") return "需求已被其他老师锁定，请返回列表刷新。";
      return "任务处理失败，请重试或转人工处理。";
    }

        <div class="notice blue"><strong>配置规则</strong><span>一级/二级销售提成比例、注册奖励、课消提成均按后台配置计算，不写死具体数值。</span></div>
        <div class="filter-bar">
          <div class="field"><label>关键词</label><input value="WD"></div>
          <div class="field"><label>状态</label><select><option>审核中</option><option>待打款</option><option>已到账</option></select></div>
          <div class="field"><label>负责人</label><input value="财务"></div>
          <div class="field"><label>时间</label><input value="2026-06-03"></div>
          <button class="btn">重置</button><button class="btn primary">查询</button>
        </div>
        <div class="risk-confirm">
          <strong>提现审核风险提示</strong>
          <span>操作对象：提现申请 WD-1001。影响范围：审核通过后进入系统外打款。是否可撤销：打款前可驳回；系统外打款完成后仅记录异常或冲正。</span>
        </div>
        <div class="table-wrap"><table><thead><tr><th>类型</th><th>所属项目</th><th>状态</th><th>金额展示</th><th>归因</th><th>操作</th></tr></thead><tbody>
          <tr><td>${mock.commission.commissionType}</td><td>${projectCode}</td><td>${tag(mock.commission.status, "blue")}</td><td>${mock.commission.amountDisplay}</td><td>购买分享链接归因</td><td><button class="btn" disabled>等待完成或课消</button></td></tr>
          <tr><td>提现申请</td><td>${projectCode}</td><td>${tag(mock.withdrawal.status, "amber")}</td><td>${money(mock.withdrawal.amount)}</td><td>${mock.withdrawal.applicant}</td><td>${isFinance ? `<button class="btn primary" onclick="runAsync('async-done','正在审核提现')">审核</button>` : `<button class="btn" disabled>${isCustomerService ? "客服无审核权限" : "仅财务审核"}</button>`}</td></tr>
          <tr><td>课消提成</td><td>${projectCode}</td><td>${tag("已冲正", "rose")}</td><td>按后台配置</td><td>退款或退单</td><td><button class="btn" disabled>查看</button></td></tr>
        </tbody></table></div>
      `, `<button class="btn" onclick="setMode('forbidden')">客服无权限</button><button class="btn" onclick="setMode('abnormal')">配置缺失</button>`);
    }

    boot();
  </script>
</body>
</html>
